<svg width="842" height="595" viewBox="0 0 842 595" xmlns="http://www.w3.org/2000/svg">
  <!-- Background Frame -->
  <rect x="0" y="0" width="842" height="595" fill="#ffffff" stroke="#000000" stroke-width="10"/>
  <rect x="20" y="20" width="802" height="555" fill="none" stroke="#000000" stroke-width="2"/>
  
  <!-- Header -->
  <text x="421" y="120" text-anchor="middle" font-family="Helvetica" font-size="48" font-weight="900" fill="#000000" style="text-transform: uppercase; letter-spacing: 2px;">
    Certificate of Participation
  </text>
  
  <text x="421" y="180" text-anchor="middle" font-family="Helvetica" font-size="20" fill="#666666">
